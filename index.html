<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* HEADER */

header{
display:flex;
align-items:center;
justify-content:center;
gap:20px;
background:white;
padding:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.logo{
height:110px;
}

h1{
font-size:42px;
color:#0e8f9b;
}

/* BOUTON SESSION */

.startSessionContainer{
display:flex;
justify-content:center;
margin:40px 0;
}

.startCircle{

width:180px;
height:180px;
border-radius:50%;

background:linear-gradient(135deg,#00c6ff,#0e8f9b);

display:flex;
align-items:center;
justify-content:center;

font-size:70px;
color:white;

cursor:pointer;

box-shadow:0 15px 35px rgba(0,0,0,0.3);

transition:transform 0.2s;

animation:pulse 2s infinite;

}

.startCircle:hover{
transform:scale(1.1);
}

.startLabel{
text-align:center;
font-size:24px;
margin-top:15px;
font-weight:bold;
color:#0e8f9b;
}

@keyframes pulse{

0%{
box-shadow:0 0 0 0 rgba(14,143,155,0.7);
}

70%{
box-shadow:0 0 0 25px rgba(14,143,155,0);
}

100%{
box-shadow:0 0 0 0 rgba(14,143,155,0);
}

}

/* LAYOUT */

.container{
display:flex;
gap:30px;
padding:30px;
max-width:1200px;
margin:auto;
align-items:flex-start;
}

.left{
flex:1;
}

.right{
width:420px;
margin-top:70px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 10px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.exercise-item{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
}

.field{
display:flex;
flex-direction:column;
margin-bottom:15px;
}

input{
padding:8px;
font-size:18px;
width:150px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#0e8f9b;
color:white;
font-size:18px;
cursor:pointer;
margin-top:5px;
}

</style>
</head>

<body>

<header>

<img class="logo" src="logo.png">
<h1>Workout Timer</h1>

</header>

<div class="startSessionContainer">

<div>

<div class="startCircle" onclick="startWorkout()">▶</div>

<div class="startLabel">Démarrer ma séance</div>

</div>

</div>

<div class="container">

<div class="left">

<div class="card">

<label>Nombre d'exercices :</label>

<input type="number" id="exerciseCount" value="3">

<button onclick="generateExercises()">Créer</button>

</div>

<div id="exerciseList"></div>

</div>

<div class="right">

<div id="editor" class="card">

<h3 id="editorTitle">Modifier exercice</h3>

<div class="field">
<label>Temps exercice</label>
<input type="number" id="timeExercise" value="30">
</div>

<div class="field">
<label>Temps repos</label>
<input type="number" id="timeRest" value="15">
</div>

<div class="field">
<label>Répétitions</label>
<input type="number" id="reps" value="5">
</div>

<div class="field">
<label>Séries</label>
<input type="number" id="sets" value="1">
</div>

<div class="field">
<label>Repos entre séries</label>
<input type="number" id="restBetweenSets" value="30">
</div>

<button onclick="saveExercise()">Sauvegarder</button>

<button onclick="startExercise()">Commencer l'exercice</button>

</div>

</div>

</div>

<script>

let exercises = JSON.parse(localStorage.getItem("exercises")) || [];
let currentIndex = 0;

function generateExercises(){

let count=document.getElementById("exerciseCount").value;

exercises=[];

for(let i=0;i<count;i++){

exercises.push({
name:"Exercice "+(i+1),
timeExercise:30,
timeRest:15,
reps:5,
sets:1,
restBetweenSets:30
});

}

saveData();
renderExercises();

}

function renderExercises(){

let container=document.getElementById("exerciseList");
container.innerHTML="";

exercises.forEach((ex,index)=>{

let div=document.createElement("div");

div.className="card exercise-item";

div.innerHTML=`
<input value="${ex.name}" onchange="renameExercise(${index},this.value)">
<button onclick="editExercise(${index})">Modifier</button>
`;

container.appendChild(div);

});

}

function renameExercise(index,value){

exercises[index].name=value;
saveData();

}

function editExercise(index){

currentIndex=index;

let ex=exercises[index];

editorTitle.innerText=ex.name;

timeExercise.value=ex.timeExercise;
timeRest.value=ex.timeRest;
reps.value=ex.reps;
sets.value=ex.sets;
restBetweenSets.value=ex.restBetweenSets;

}

function saveExercise(){

let ex=exercises[currentIndex];

ex.timeExercise=parseInt(timeExercise.value);
ex.timeRest=parseInt(timeRest.value);
ex.reps=parseInt(reps.value);
ex.sets=parseInt(sets.value);
ex.restBetweenSets=parseInt(restBetweenSets.value);

saveData();

alert("Sauvegardé");

}

function startExercise(){

saveData();

localStorage.setItem("mode","single");
localStorage.setItem("exerciseIndex",currentIndex);

window.location="timer.html";

}

function startWorkout(){

saveData();

localStorage.setItem("mode","session");

window.location="timer.html";

}

function saveData(){

localStorage.setItem("exercises",JSON.stringify(exercises));

}

renderExercises();

</script>

</body>
</html>
