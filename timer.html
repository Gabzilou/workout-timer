<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

.phase{
font-size:42px;
margin-bottom:10px;
}

.exerciseName{
font-size:30px;
margin-bottom:5px;
}

.seriesInfo{
font-size:22px;
margin-bottom:20px;
}

.timer{
font-size:120px;
font-weight:bold;
}

svg{
width:300px;
height:300px;
margin-bottom:20px;
}

circle{
fill:none;
stroke-width:15;
}

.bg{
stroke:#333;
}

.progress{
stroke-linecap:round;
transform:rotate(-90deg);
transform-origin:50% 50%;
stroke-dasharray:880;
stroke-dashoffset:880;
}

.sessionBar{
width:80%;
height:20px;
background:#333;
border-radius:10px;
overflow:hidden;
margin-top:20px;
}

.sessionProgress{
height:100%;
width:0%;
background:#00c6ff;
transition:width 0.5s;
}

.controls{
margin-top:25px;
}

button{
padding:14px 22px;
margin:6px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

.pause{background:#ff9800;color:white;}
.reset{background:#f44336;color:white;}
.menu{background:#0e8f9b;color:white;}

</style>
</head>

<body>

<div class="phase" id="phase">Préparation</div>

<div class="exerciseName" id="exerciseName"></div>

<div class="seriesInfo" id="seriesInfo"></div>

<svg viewBox="0 0 300 300">
<circle class="bg" cx="150" cy="150" r="140"/>
<circle class="progress" id="progress" cx="150" cy="150" r="140"/>
</svg>

<div class="timer" id="timer">5</div>

<div class="sessionBar">
<div class="sessionProgress" id="sessionProgress"></div>
</div>

<div class="controls">
<button class="pause" onclick="togglePause()">Pause</button>
<button class="reset" onclick="resetTimer()">Reset</button>
<button class="menu" onclick="backMenu()">Retour menu</button>
</div>

<script>

/* PLEIN ECRAN AUTOMATIQUE */

function enterFullscreen(){

let el=document.documentElement;

if(el.requestFullscreen){
el.requestFullscreen();
}
else if(el.webkitRequestFullscreen){
el.webkitRequestFullscreen();
}
else if(el.msRequestFullscreen){
el.msRequestFullscreen();
}

}

window.onload=enterFullscreen;

/* TIMER */

let exercises = JSON.parse(localStorage.getItem("exercises"));

let mode = localStorage.getItem("mode") || "session";
let exerciseIndex = parseInt(localStorage.getItem("exerciseIndex")) || 0;

let currentExercise = mode==="single" ? exerciseIndex : 0;

let ex = exercises[currentExercise];

let timerEl=document.getElementById("timer");
let phaseEl=document.getElementById("phase");
let infoEl=document.getElementById("seriesInfo");
let nameEl=document.getElementById("exerciseName");
let progressCircle=document.getElementById("progress");
let sessionBar=document.getElementById("sessionProgress");

let circumference=880;

let phase="prep";
let timeLeft=5;
let totalTime=5;

let paused=false;

let currentRep=1;
let currentSet=1;

let totalSteps=0;
let completedSteps=0;

if(mode==="single"){

totalSteps = ex.reps * ex.sets * 2;

}else{

exercises.forEach(e=>{
totalSteps += e.reps * e.sets * 2;
});

}

updateInfo();
updateTimer();

let interval=setInterval(runTimer,1000);

function runTimer(){

if(paused) return;

timeLeft--;

updateTimer();

if(timeLeft<=0){

switch(phase){

case "prep":

phase="exercise";
phaseEl.innerText="Exercice";
progressCircle.style.stroke="#00c6ff";

timeLeft=ex.timeExercise;
totalTime=ex.timeExercise;

break;

case "exercise":

phase="rest";
phaseEl.innerText="Repos";
progressCircle.style.stroke="#ff9800";

timeLeft=ex.timeRest;
totalTime=ex.timeRest;

completedSteps++;

break;

case "rest":

completedSteps++;

if(currentRep < ex.reps){

currentRep++;

phase="exercise";
phaseEl.innerText="Exercice";
progressCircle.style.stroke="#00c6ff";

timeLeft=ex.timeExercise;
totalTime=ex.timeExercise;

}else{

if(currentSet < ex.sets){

phase="setRest";
phaseEl.innerText="Repos série";
progressCircle.style.stroke="#ffd600";

timeLeft=ex.restBetweenSets;
totalTime=ex.restBetweenSets;

currentSet++;
currentRep=1;

}else{

if(mode==="session" && currentExercise < exercises.length-1){

currentExercise++;
ex = exercises[currentExercise];

currentRep=1;
currentSet=1;

phase="prep";
phaseEl.innerText="Préparation";

timeLeft=5;
totalTime=5;

}else{

phaseEl.innerText="Terminé";
progressCircle.style.stroke="#9c27b0";
clearInterval(interval);
return;

}

}

}

break;

case "setRest":

phase="exercise";
phaseEl.innerText="Exercice";
progressCircle.style.stroke="#00c6ff";

timeLeft=ex.timeExercise;
totalTime=ex.timeExercise;

break;

}

updateInfo();
updateSessionBar();

}

}

function updateTimer(){

timerEl.innerText=timeLeft;

let percent=timeLeft/totalTime;

progressCircle.style.strokeDashoffset=circumference*(1-percent);

}

function updateInfo(){

nameEl.innerText = ex.name;

infoEl.innerText =
"Série "+currentSet+" / "+ex.sets+"   |   Répétition "+currentRep+" / "+ex.reps;

}

function updateSessionBar(){

let percent=(completedSteps/totalSteps)*100;

sessionBar.style.width=percent+"%";

}

function togglePause(){

paused=!paused;

}

function resetTimer(){

location.reload();

}

function backMenu(){

if(document.exitFullscreen){
document.exitFullscreen();
}

window.location="index.html";

}

progressCircle.style.stroke="#4caf50";

</script>

</body>
</html>
